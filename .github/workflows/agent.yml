name: My Brain Agent

on:
  repository_dispatch:
    types: [line-trigger-agent, telegram-trigger-agent, brain-trigger-agent]

env:
  USER_INPUT: ${{ github.event.client_payload.user_input }}
  USER_ID: ${{ github.event.client_payload.user_id }}
  GROUP_ID: ${{ github.event.client_payload.group_id }}
  SOURCE_TYPE: ${{ github.event.client_payload.source_type }}
  PLATFORM: ${{ github.event.client_payload.platform || 'line' }}
  CHAT_ID: ${{ github.event.client_payload.chat_id || '' }}

jobs:
  # ── 1. Detect mode (no repo access needed) ──────────────────────
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: none
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
    steps:
      - name: Detect write vs query mode
        id: detect
        env:
          OWNER_LINE_USER_ID: ${{ secrets.OWNER_LINE_USER_ID }}
          OWNER_TELEGRAM_USER_ID: ${{ secrets.OWNER_TELEGRAM_USER_ID }}
          ALLOWED_LINE_USER_IDS: ${{ secrets.ALLOWED_LINE_USER_IDS }}
        run: |
          printf '%s' "${USER_INPUT}" > /tmp/user_input.txt

          # Telegram whitelist
          if [ "${PLATFORM}" = "telegram" ] && [ "${USER_ID}" != "${OWNER_TELEGRAM_USER_ID}" ]; then
            echo "mode=unauthorized" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # LINE whitelist (second layer; n8n is first)
          if [ "${PLATFORM}" = "line" ]; then
            if ! echo ",${ALLOWED_LINE_USER_IDS}," | grep -qF ",${USER_ID},"; then
              echo "mode=unauthorized" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Write mode: owner only, triggered by keyword
          if [ "${USER_ID}" = "${OWNER_LINE_USER_ID}" ] && grep -qiE "幫我記|記到wiki|記入wiki|記一下" /tmp/user_input.txt; then
            echo "mode=write" >> "$GITHUB_OUTPUT"
          else
            echo "mode=query" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Query (contents: read) ───────────────────────────────────
  query:
    needs: detect
    if: needs.detect.outputs.mode == 'query'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      result: ${{ steps.agent.outputs.result }}
      status: ${{ steps.agent.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Query Agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          OWNER_LINE_USER_ID: ${{ secrets.OWNER_LINE_USER_ID }}
        run: |
          printf '%s' "${USER_INPUT}" > /tmp/user_input.txt

          load_dir() {
            find "$1" -name "*.md" 2>/dev/null | while read f; do
              echo "### $f"
              cat "$f"
              echo ""
            done
          }

          # Owner sees all wiki; others only see wiki/family/
          if [ "${USER_ID}" = "${OWNER_LINE_USER_ID}" ]; then
            WIKI_CONTENT=$(load_dir "wiki/")
          else
            WIKI_CONTENT=$(load_dir "wiki/family/")
          fi

          PROMPT="你是家族智慧助手。以下是知識庫內容，請根據這些資料加上自身知識回答問題。用繁體中文簡潔回答，必要時可到150字，不要為了湊字數而延伸。不要使用 markdown 格式（不要用 *、**、#、- 等符號），純文字即可。

          === 知識庫 ===
          ${WIKI_CONTENT}
          === 結束 ===

          問題：$(cat /tmp/user_input.txt)"

          claude -p "${PROMPT}" \
            --output-format json \
            --model "claude-haiku-4-5-20251001" \
            > /tmp/claude_output.json 2>/tmp/claude_error.txt

          CLAUDE_EXIT=$?

          if [ $CLAUDE_EXIT -eq 0 ]; then
            RESULT=$(jq -r '.result // .content // empty' /tmp/claude_output.json 2>/dev/null)
            [ -z "$RESULT" ] || [ "$RESULT" = "null" ] && RESULT=$(cat /tmp/claude_output.json)
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            RESULT="抱歉，處理您的問題時發生錯誤，請稍後再試。"
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'result<<EOF_RESULT'
            printf '%s\n' "${RESULT}"
            echo 'EOF_RESULT'
          } >> "$GITHUB_OUTPUT"

  # ── 3. Write (contents: write, owner only) ──────────────────────
  write:
    needs: detect
    if: needs.detect.outputs.mode == 'write'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      result: ${{ steps.agent.outputs.result }}
      status: ${{ steps.agent.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Write Agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          printf '%s' "${USER_INPUT}" > /tmp/user_input.txt
          TODAY=$(date +%Y-%m-%d)

          {
            echo '[WRITE MODE] EXECUTE immediately - do not describe what you will do.'
            echo ''
            echo "User message: $(cat /tmp/user_input.txt)"
            echo ''
            echo 'Route to the correct file based on content keywords:'
            echo '  phone/contact/wifi/repair -> wiki/family/home.md'
            echo '  unclear -> wiki/family/home.md'
            echo ''
            echo 'Steps:'
            echo '1. Read the target file to understand its structure'
            echo '2. Append using Edit tool, matching existing style:'
            echo "   - General note: add \"- [${TODAY}] content\" under ## Notes (create if missing)"
            echo '   - Contact info: add a table row'
            echo "3. Update frontmatter compiled date to ${TODAY}"
            echo '4. Reply in Traditional Chinese plain text: already recorded to <file>: <summary>'
          } > /tmp/write_prompt.txt

          claude -p "$(cat /tmp/write_prompt.txt)" \
            --output-format json \
            --model "claude-sonnet-4-6" \
            --max-turns 8 \
            > /tmp/claude_output.json 2>/tmp/claude_error.txt

          CLAUDE_EXIT=$?

          git config user.email "actions@github.com"
          git config user.name "My Brain Bot"
          if [ -n "$(git status --porcelain wiki/)" ]; then
            git add wiki/
            git commit -m "wiki: [LINE] $(head -c 60 /tmp/user_input.txt)"
            git push
          fi

          if [ $CLAUDE_EXIT -eq 0 ]; then
            RESULT=$(jq -r '.result // .content // empty' /tmp/claude_output.json 2>/dev/null)
            [ -z "$RESULT" ] || [ "$RESULT" = "null" ] && RESULT=$(cat /tmp/claude_output.json)
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            RESULT="抱歉，寫入 wiki 時發生錯誤，請稍後再試。"
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'result<<EOF_RESULT'
            printf '%s\n' "${RESULT}"
            echo 'EOF_RESULT'
          } >> "$GITHUB_OUTPUT"

  # ── 4. Notify n8n (always runs) ─────────────────────────────────
  notify:
    needs: [detect, query, write]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: none
    steps:
      - name: Send result to n8n
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          MODE: ${{ needs.detect.outputs.mode }}
          QUERY_RESULT: ${{ needs.query.outputs.result }}
          WRITE_RESULT: ${{ needs.write.outputs.result }}
          QUERY_STATUS: ${{ needs.query.outputs.status }}
          WRITE_STATUS: ${{ needs.write.outputs.status }}
        run: |
          if [ "${MODE}" = "unauthorized" ]; then
            STATUS="error"
            RESULT_TEXT="未授權的使用者。"
          else
            STATUS="${QUERY_STATUS:-${WRITE_STATUS:-error}}"
            RESULT_TEXT="${QUERY_RESULT:-${WRITE_RESULT:-系統發生未預期的錯誤，請稍後再試。}}"
          fi

          PAYLOAD=$(jq -n \
            --arg user_id "${USER_ID}" \
            --arg group_id "${GROUP_ID}" \
            --arg source_type "${SOURCE_TYPE}" \
            --arg platform "${PLATFORM}" \
            --arg chat_id "${CHAT_ID}" \
            --arg result "${RESULT_TEXT}" \
            --arg status "${STATUS}" \
            '{user_id: $user_id, group_id: $group_id, source_type: $source_type, platform: $platform, chat_id: $chat_id, result: $result, status: $status}')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${N8N_WEBHOOK_URL}")

          echo "n8n HTTP: ${HTTP_CODE}"
          if [[ "$HTTP_CODE" != 2* ]]; then
            echo "::warning::n8n returned non-2xx: ${HTTP_CODE}"
          fi
